name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: "true"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm lint
        continue-on-error: true

      - run: pnpm -r build

      - run: pnpm -r test --if-present

  devbox-validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write          # commit devbox.lock back to the PR branch
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: true
      - name: Resolve and pin devbox.lock
        run: devbox install
      - name: Commit devbox.lock if it changed
        run: |
          if ! git diff --quiet -- devbox.lock; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add devbox.lock
            git commit -m "ci: pin devbox.lock"
            git push
          fi
