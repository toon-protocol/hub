# Fixture: pre-rendered HS compose for unit tests.
# Digest values match the fixture image-manifest.json (all-hex patterns).
networks:
  townhouse-hs-net:
    driver: bridge
volumes:
  townhouse-hs-anon:
services:
  connector:
    image: ghcr.io/toon-protocol/connector@sha256:eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee
    container_name: townhouse-hs-connector
    networks:
      - townhouse-hs-net
    ports:
      - '127.0.0.1:9401:9401'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:9401/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  townhouse-api:
    image: ghcr.io/toon-protocol/townhouse-api@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    container_name: townhouse-hs-api
    networks:
      - townhouse-hs-net
    depends_on:
      connector:
        condition: service_healthy
    ports:
      - '127.0.0.1:28090:28090'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.townhouse:/.townhouse:rw
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:28090/api/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  town:
    image: ghcr.io/toon-protocol/town@sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
    profiles: [town]
    networks:
      - townhouse-hs-net
    depends_on:
      connector:
        condition: service_healthy
  mill:
    image: ghcr.io/toon-protocol/mill@sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
    profiles: [mill]
    networks:
      - townhouse-hs-net
    depends_on:
      connector:
        condition: service_healthy
  dvm:
    image: ghcr.io/toon-protocol/dvm@sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
    profiles: [dvm]
    networks:
      - townhouse-hs-net
    depends_on:
      connector:
        condition: service_healthy
